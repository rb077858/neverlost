<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טוען...</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #e0e5ec;
    margin: 0;
    padding: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: #e0e5ec;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    width: 100%;
    max-width: 400px;
    box-shadow:  20px 20px 60px #babecc,
                 -20px -20px 60px #ffffff;
}

h1 {
    font-size: 22px;
    margin-bottom: 15px;
    color: #333;
}

p {
    color: #555;
    font-size: 16px;
    margin-bottom: 25px;
}

.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.btn {
    padding: 14px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    font-size: 17px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: inset 4px 4px 10px #babecc,
                inset -4px -4px 10px #ffffff;
    transition: 0.2s;
}

.btn:hover {
    box-shadow: inset -4px -4px 10px #babecc,
                inset 4px 4px 10px #ffffff;
}

.whatsapp { background: #25D366; }
.phone { background: #007BFF; }
.email { background: #FF6B6B; }
</style>
</head>

<body>

<div class="container">
    <h1 id="title">טוען...</h1>
    <p id="message"></p>

    <div class="buttons">
        <a id="wa" class="btn whatsapp">💬 שלח וואטסאפ</a>
        <a id="phone" class="btn phone">📞 התקשר</a>
        <a id="email" class="btn email">✉️ שלח מייל</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 קונפיג Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC6aKRxx0JkeBA7RjeZK23SkCLeO-zqXVU",
  authDomain: "lost-items-28167.firebaseapp.com",
  projectId: "lost-items-28167",
  storageBucket: "lost-items-28167.firebasestorage.app",
  messagingSenderId: "536499158176",
  appId: "1:536499158176:web:ea2fbf70e173ab59a9ddc5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔍 קבלת ID מהקישור
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id) {
    document.getElementById("title").innerText = "❌ אין קוד";
    throw new Error("No ID provided");
}

// 📦 שליפת נתונים
const docRef = doc(db, "items", id);
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {
    const item = docSnap.data();

    // ✨ תוכן
    document.getElementById("title").innerText = "📦 מצאת את ה" + item.name + " שלי!";
    document.getElementById("message").innerText = item.message || "אשמח אם תחזיר 🙏";

    document.title = item.name;

    // 📱 וואטסאפ
    const waText = encodeURIComponent("היי, מצאתי את ה" + item.name + " שלך!");
    if(item.phone) {
        const phoneWithoutZero = item.phone.startsWith("0") ? item.phone.substring(1) : item.phone;
        document.getElementById("wa").href = "https://wa.me/972" + phoneWithoutZero + "?text=" + waText;
        document.getElementById("phone").href = "tel:" + item.phone;
    } else {
        document.getElementById("wa").style.display = "none";
        document.getElementById("phone").style.display = "none";
    }

    if(item.email) {
        document.getElementById("email").href = "mailto:" + item.email;
    } else {
        document.getElementById("email").style.display = "none";
    }

} else {
    document.getElementById("title").innerText = "❌ חפץ לא נמצא";
    document.getElementById("message").innerText = "ייתכן שהקוד שגוי";
    document.title = "שגיאה";

    document.getElementById("wa").style.display = "none";
    document.getElementById("phone").style.display = "none";
    document.getElementById("email").style.display = "none";
}
</script>

</body>
</html>
