<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeverLost</title>
  <link rel="icon" type="image/png" href="assets/logo.png">

<style>
body {
  font-family: Arial, sans-serif;
  background: #e0e5ec;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

/* לוגו */
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.logo img {
  width: 50px;
  height: 50px;
}

.logo h1 {
  margin: 0;
  font-size: 28px;
}

/* כרטיסים */
.card {
  background: #e0e5ec;
  border-radius: 20px;
  padding: 20px;
  margin: 15px 0;
  box-shadow: 10px 10px 30px #babecc,
              -10px -10px 30px #ffffff;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  background: #74b9ff;
  color: white;
  cursor: pointer;
}

.login { background:#DB4437; }
.logout { background:#555; }
.delete { background:red; }
.download { background:#28a745; }

.info {
  text-align: center;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- 🔥 לוגו -->
  <div class="logo">
    <img src="logo.png">
    <h1>NeverLost</h1>
  </div>

  <button id="loginBtn" class="login" onclick="login()">🔐 התחבר עם Google</button>
  <button id="logoutBtn" class="logout" onclick="logout()" style="display:none;">🔓 התנתק</button>

  <div id="userInfo" class="info"></div>

  <!-- טופס -->
  <div id="app" style="display:none;">

    <div class="card">
      <h2>צור חפץ חדש</h2>

      <input id="name" placeholder="שם החפץ">
      <textarea id="message" placeholder="טקסט למוצא"></textarea>
      <input id="phone" placeholder="טלפון">
      <input id="email" placeholder="אימייל">

      <button onclick="createItem()">➕ צור חפץ</button>

      <p id="status"></p>
      <div id="qrNew"></div>
    </div>

    <div class="card">
      <h2>החפצים שלי</h2>
      <div id="items"></div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "lost-items-28167.firebaseapp.com",
  projectId: "lost-items-28167",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

let userEmail = "";

// מערכת pro.txt
async function getUserLimit(email) {
    try {
        const res = await fetch("pro.txt");
        const text = await res.text();
        const lines = text.split("\n");

        let total = 0;
        let unlimited = false;
        const today = new Date();

        lines.forEach(line=>{
            const match = line.match(/^(.+?)\s*-\s*([^\s]+)(?:\(([^)]+)\))?$/);
            if(!match) return;

            const mail = match[1].trim();
            const val = match[2].trim();
            const exp = match[3];

            if(mail !== email) return;

            if(exp){
                const [d,m,y]=exp.split(".");
                if(new Date(`${y}-${m}-${d}`) < today) return;
            }

            if(val==="+") unlimited=true;
            else total += parseInt(val)||0;
        });

        if(unlimited) return Infinity;
        return total>0?total:5;

    } catch { return 5; }
}

// התחברות
window.login = async ()=> await signInWithPopup(auth, provider);

// התנתקות
window.logout = async ()=>{
    await signOut(auth);
    document.getElementById("app").style.display="none";
    document.getElementById("loginBtn").style.display="block";
    document.getElementById("logoutBtn").style.display="none";
};

// אחרי התחברות
onAuthStateChanged(auth, async (user)=>{
    if(user){
        userEmail = user.email;
        document.getElementById("app").style.display="block";
        document.getElementById("loginBtn").style.display="none";
        document.getElementById("logoutBtn").style.display="block";
        loadItems();
    }
});

// יצירה
window.createItem = async function(){

    const name=nameInput.value;
    const message=messageInput.value;
    const phone=phoneInput.value;
    const email=emailInput.value;

    const q = query(collection(db,"items"), where("owner","==",userEmail));
    const snapshot = await getDocs(q);

    const limit = await getUserLimit(userEmail);

    if(snapshot.size >= limit){
        status.innerText="אין תגים זמינים";
        return;
    }

    const docRef = await addDoc(collection(db,"items"), {
        name,message,phone,email,owner:userEmail
    });

    const link = `https://rb077858.github.io/neverlost/tag.html?id=${docRef.id}`;

    status.innerHTML=`נוצר! <br><a href="${link}" target="_blank">פתח</a>`;

    // QR
    qrNew.innerHTML="";
    const canvas=document.createElement("canvas");
    qrNew.appendChild(canvas);
    QRCode.toCanvas(canvas, link);

    const btn=document.createElement("button");
    btn.innerText="⬇ הורד QR";
    btn.className="download";
    btn.onclick=()=>{
        const a=document.createElement("a");
        a.href=canvas.toDataURL();
        a.download=name+".png";
        a.click();
    };
    qrNew.appendChild(btn);

    loadItems();
};

// טעינה
async function loadItems(){
    items.innerHTML="";

    const q = query(collection(db,"items"), where("owner","==",userEmail));
    const snapshot = await getDocs(q);

    const limit = await getUserLimit(userEmail);
    const remaining = limit===Infinity?"∞":Math.max(0, limit - snapshot.size);

    userInfo.innerText=`${userEmail} | נשאר: ${remaining}`;

    snapshot.forEach(docSnap=>{
        const item=docSnap.data();
        const id=docSnap.id;
        const link=`https://rb077858.github.io/neverlost/tag.html?id=${id}`;

        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`<b>${item.name}</b><br><a href="${link}" target="_blank">פתח</a>`;

        const canvas=document.createElement("canvas");
        QRCode.toCanvas(canvas, link, {width:120});
        div.appendChild(canvas);

        const dl=document.createElement("button");
        dl.innerText="⬇ הורד QR";
        dl.className="download";
        dl.onclick=()=>{
            const a=document.createElement("a");
            a.href=canvas.toDataURL();
            a.download=item.name+".png";
            a.click();
        };
        div.appendChild(dl);

        const del=document.createElement("button");
        del.innerText="מחק";
        del.className="delete";
        del.onclick=async()=>{
            await deleteDoc(doc(db,"items",id));
            loadItems();
        };
        div.appendChild(del);

        items.appendChild(div);
    });
}
</script>

</body>
</html>
