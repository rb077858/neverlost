<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

<!-- 🔥 חשוב לנייד -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>טוען...</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    margin: 0;
    padding: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

p {
    font-size: 16px;
    color: #555;
}

.buttons {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.btn {
    padding: 14px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-size: 17px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
}

.btn:active {
    transform: scale(0.97);
}

.whatsapp { background: #25D366; }
.phone { background: #007BFF; }
.email { background: #FF6B6B; }

/* 📱 התאמות למסכים קטנים מאוד */
@media (max-width: 350px) {
    h1 { font-size: 18px; }
    p { font-size: 14px; }
    .btn { font-size: 15px; padding: 12px; }
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title">טוען...</h1>
    <p id="desc"></p>

    <div class="buttons">
        <a id="wa" class="btn whatsapp">💬 וואטסאפ</a>
        <a id="phone" class="btn phone">📞 התקשר</a>
        <a id="email" class="btn email">✉️ שלח מייל</a>
    </div>
</div>

<script>
const items = {
    "calc1": {
        name: "📱 מצאתם את המחשבון שלי!",
        desc: "אשמח מאוד אם תחזירו אותו 🙏",
        phone: "0532476787",
        email: "rb077858@gmail.com"
    },
    "bag1": {
        name: "🎒 מצאתם את התיק שלי!",
        desc: "יש שם דברים חשובים 😅 אשמח אם תחזירו",
        phone: "0532476787",
        email: "rb077858@gmail.com"
    },
    "laptop1": {
        name: "💻 מצאתם את המחשב שלי!",
        desc: "יש עליו דברים חשובים מאוד 🙏 אשמח אם תחזירו",
        phone: "0532476787",
        email: "rb077858@gmail.com"
    },
    "phone1": {
        name: "📱 מצאתם את הטלפון שלי!",
        desc: "זה ממש חשוב לי 😱 אשמח אם תחזירו",
        phone: "0532476787",
        email: "rb077858@gmail.com"
    }
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (items[id]) {
    const item = items[id];

    document.getElementById("title").innerText = item.name;
    document.getElementById("desc").innerText = item.desc;
    document.title = item.name;

    document.getElementById("wa").href =
        "https://wa.me/972" + item.phone.substring(1);

    document.getElementById("phone").href =
        "tel:" + item.phone;

    document.getElementById("email").href =
        "mailto:" + item.email;

} else {
    document.getElementById("title").innerText = "❌ חפץ לא נמצא";
    document.getElementById("desc").innerText = "ייתכן שהקוד שגוי";
    document.title = "שגיאה";
}
</script>

</body>
</html>
