<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeverLost - דשבורד</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #e0e5ec;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
}

.container {
  max-width: 800px;
  width: 100%;
  padding: 30px;
  margin-top: 40px;
  border-radius: 25px;
  background: #e0e5ec;
  box-shadow:  20px 20px 60px #babecc,
               -20px -20px 60px #ffffff;
  transition: all 0.3s ease;
}

/* דפים פנימיים עם אנימציה */
.page {
  display: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.page.active {
  display: block;
  opacity: 1;
}

h1, h2 {
  text-align: center;
  color: #333;
  margin-bottom: 20px;
}

.card {
  background: #e0e5ec;
  border-radius: 20px;
  padding: 20px;
  margin: 15px 0;
  box-shadow:  10px 10px 30px #babecc,
               -10px -10px 30px #ffffff;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 15px;
  background: #74b9ff;
  color: white;
  font-size: 16px;
  cursor: pointer;
  box-shadow: inset 2px 2px 5px #babecc,
              inset -2px -2px 5px #ffffff;
  transition: all 0.2s ease;
  margin-top: 10px;
}

button:hover {
  box-shadow: inset -2px -2px 5px #babecc,
              inset 2px 2px 5px #ffffff;
}

.login { background:#DB4437; }
.logout { background:#555; }

.info { font-size:16px; margin-bottom:15px; text-align:center; }

.nav-link {
  display: block;
  text-align: center;
  text-decoration: none;
  margin: 10px 0;
  font-weight: bold;
  color: #333;
  padding: 10px;
  border-radius: 15px;
  box-shadow: 5px 5px 15px #babecc,
             -5px -5px 15px #ffffff;
  background: #e0e5ec;
  transition: 0.2s;
}

.nav-link:hover {
  box-shadow: inset 5px 5px 15px #babecc,
              inset -5px -5px 15px #ffffff;
}

/* QR */
.qr-container { margin-top:10px; text-align:center; }
.qr-download { margin-top:5px; background:#28a745; color:white; border:none; border-radius:10px; padding:8px; cursor:pointer; }
</style>
</head>

<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KQ64DLQZ"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="container">
  <h1>NeverLost Dashboard</h1>

  <button id="loginBtn" class="login" onclick="login()">🔐 התחבר עם Google</button>
  <button id="logoutBtn" class="logout" onclick="logout()" style="display:none;">🔓 התנתק</button>

  <div id="userInfo" class="info"></div>

  <!-- דשבורד -->
  <div id="dashboardPage" class="page">
    <div class="card" id="cardStats">
      <h2>סטטוס תגים</h2>
      <p id="statsInfo">טוען...</p>
    </div>

    <button class="nav-link" onclick="showPage('createPage')">➕ צור חפץ חדש</button>
    <button class="nav-link" onclick="loadDashboard()">🔄 רענן דשבורד</button>

    <div class="card">
      <h2>החפצים שלי</h2>
      <div id="items"></div>
    </div>
  </div>

  <!-- עמוד יצירת חפץ -->
  <div id="createPage" class="page">
    <div class="card">
      <h2>צור חפץ חדש</h2>
      <input id="name" placeholder="שם החפץ">
      <textarea id="message" placeholder="טקסט שהמוצא יראה"></textarea>
      <input id="phone" placeholder="טלפון">
      <input id="email" placeholder="אימייל">
      <button onclick="createItem()">צור חפץ</button>
      <p id="status"></p>
      <div id="qrNew" class="qr-container"></div>
      <button onclick="showPage('dashboardPage')">⬅ חזור לדשבורד</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6aKRxx0JkeBA7RjeZK23SkCLeO-zqXVU",
  authDomain: "lost-items-28167.firebaseapp.com",
  projectId: "lost-items-28167",
  storageBucket: "lost-items-28167.firebasestorage.app",
  messagingSenderId: "536499158176",
  appId: "1:536499158176:web:ea2fbf70e173ab59a9ddc5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

let userEmail = "";

// מערכת pro.txt
async function getUserLimit(email) {
    try {
        const res = await fetch("pro.txt");
        const text = await res.text();
        const lines = text.split("\n");
        let total = 0;
        let isUnlimited = false;
        const today = new Date();

        lines.forEach(line => {
            line = line.trim();
            if (!line) return;
            const match = line.match(/^(.+?)\s*-\s*([^\s]+)(?:\s*\(([^)]+)\))?$/);
            if (!match) return;
            const userEmailLine = match[1].trim();
            const value = match[2].trim();
            const expiry = match[3];
            if (userEmailLine !== email) return;
            if (expiry) {
                const [day, month, year] = expiry.split(".");
                const expiryDate = new Date(`${year}-${month}-${day}`);
                if (expiryDate < today) return;
            }
            if (value === "+") isUnlimited = true;
            else total += parseInt(value) || 0;
        });

        if (isUnlimited) return Infinity;
        return total > 0 ? total : 5;

    } catch {
        return 5;
    }
}

// התחברות
window.login = async () => await signInWithPopup(auth, provider);

// התנתקות
window.logout = async () => {
    await signOut(auth);
    userEmail = "";
    showPage(null); // הסתר הכל
    document.getElementById("loginBtn").style.display="block";
    document.getElementById("logoutBtn").style.display="none";
};

// הצגת עמוד פנימי עם אנימציה
function showPage(id) {
    document.querySelectorAll('.page').forEach(p=>{
        p.classList.remove('active');
    });
    if(id) document.getElementById(id).classList.add('active');
}

// אחרי התחברות
onAuthStateChanged(auth, async (user)=>{
    if(user){
        userEmail = user.email;
        document.getElementById("loginBtn").style.display="none";
        document.getElementById("logoutBtn").style.display="block";
        showPage('dashboardPage');
        loadDashboard();
    }
});

// טעינת דשבורד
async function loadDashboard(){
    const itemsContainer = document.getElementById("items");
    itemsContainer.innerHTML = "";
    const q = query(collection(db,"items"), where("owner","==",userEmail));
    const snapshot = await getDocs(q);
    const limit = await getUserLimit(userEmail);
    let remaining = limit === Infinity ? "∞" : Math.max(0, limit - snapshot.size);

    document.getElementById("statsInfo").innerText =
        `מחובר כ: ${userEmail}\nנשאר ליצור: ${remaining}`;

    snapshot.forEach(docSnap=>{
        const item = docSnap.data();
        const id = docSnap.id;
        const link = `https://rb077858.github.io/neverlost/tag.html?id=${id}`;

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<b>${item.name}</b><br><a href="${link}" target="_blank">פתח</a>`;

        const canvas = document.createElement("canvas");
        QRCode.toCanvas(canvas, link, {width:150});
        div.appendChild(canvas);

        const delBtn = document.createElement("button");
        delBtn.innerText = "מחק";
        delBtn.onclick = async function() {
            await deleteDoc(doc(db,"items",id));
            loadDashboard();
        };
        div.appendChild(delBtn);

        itemsContainer.appendChild(div);
    });
}

// יצירת חפץ
window.createItem = async function(){
    const name=document.getElementById("name").value;
    const message=document.getElementById("message").value;
    const phone=document.getElementById("phone").value;
    const email=document.getElementById("email").value;

    const q = query(collection(db,"items"), where("owner","==",userEmail));
    const snapshot = await getDocs(q);
    const limit = await getUserLimit(userEmail);

    if (snapshot.size >= limit) {
        document.getElementById("status").innerText =
            "הגעת למקסימום תגים (" + (limit === Infinity ? "∞" : limit) + ")";
        return;
    }

    const docRef = await addDoc(collection(db,"items"), {
        name,message,phone,email,owner:userEmail
    });

    const link = `https://rb077858.github.io/neverlost/tag.html?id=${docRef.id}`;

    document.getElementById("status").innerHTML =
        "נוצר! <br><a href='"+link+"' target='_blank'>"+link+"</a>";

    const qrDiv=document.getElementById("qrNew");
    qrDiv.innerHTML="";
    const canvas=document.createElement("canvas");
    qrDiv.appendChild(canvas);
    QRCode.toCanvas(canvas, link, {width:200});

    const btn=document.createElement("button");
    btn.innerText="⬇ הורד QR";
    btn.className="qr-download";
    btn.onclick=function(){
        const a=document.createElement("a");
        a.href=canvas.toDataURL("image/png");
        a.download=name+"_QR.png";
        a.click();
    };
    qrDiv.appendChild(btn);

    loadDashboard();
    showPage('dashboardPage'); // חזרה אוטומטית לדשבורד אחרי יצירה
};
</script>
</body>
</html>
