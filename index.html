<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>טוען...</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.buttons {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.btn {
    padding: 12px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-size: 16px;
    font-weight: bold;
}

.whatsapp { background: #25D366; }
.phone { background: #007BFF; }
.email { background: #FF6B6B; }
</style>
</head>

<body>

<div class="container">
    <h1 id="title">טוען...</h1>
    <p id="desc"></p>

    <div class="buttons">
        <a id="wa" class="btn whatsapp">וואטסאפ</a>
        <a id="phone" class="btn phone">טלפון</a>
        <a id="email" class="btn email">מייל</a>
    </div>
</div>

<script>
// 🧠 "מסד נתונים" של החפצים
const items = {
    "calc1": {
        name: "📱 מצאתם את המחשבון שלי!",
        desc: "אשמח מאוד אם תחזירו אותו 🙏",
        phone: "0532476787",
        email: "rb077858@gmail.com"
    },
    "bag1": {
        name: "🎒 מצאתם את התיק שלי!",
        desc: "יש שם דברים חשובים 😅 אשמח אם תחזירו",
        phone: "0532476787",
        email: "rb077858@gmail.com"
    },
    "laptop1": {
        name: "💻 מצאתם את המחשב שלי!",
        desc: "יש עליו דברים חשובים מאוד 🙏 אשמח אם תחזירו",
        phone: "0532476787",
        email: "rb077858@gmail.com"
    },
    "phone1": {
        name: "📱 מצאתם את הטלפון שלי!",
        desc: "זה ממש חשוב לי 😱 אשמח אם תחזירו",
        phone: "0532476787",
        email: "rb077858@gmail.com"
    }
};

// 🔍 לוקח את ה-ID מהקישור
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// אם החפץ קיים
if (items[id]) {
    const item = items[id];

    // תוכן הדף
    document.getElementById("title").innerText = item.name;
    document.getElementById("desc").innerText = item.desc;

    // 🧠 משנה גם את כותרת הדפדפן!
    document.title = item.name;

    // כפתורים
    document.getElementById("wa").href =
        "https://wa.me/972" + item.phone.substring(1);

    document.getElementById("phone").href =
        "tel:" + item.phone;

    document.getElementById("email").href =
        "mailto:" + item.email;

} else {
    document.getElementById("title").innerText = "❌ חפץ לא נמצא";
    document.getElementById("desc").innerText = "ייתכן שהקוד שגוי";
    document.title = "שגיאה";
}
</script>

</body>
</html>
