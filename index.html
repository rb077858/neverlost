<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טוען...</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    margin: 0;
    padding: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

p {
    color: #555;
    font-size: 16px;
}

.buttons {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.btn {
    padding: 14px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-size: 17px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
}

.btn:active {
    transform: scale(0.97);
}

.whatsapp { background: #25D366; }
.phone { background: #007BFF; }
.email { background: #FF6B6B; }
</style>
</head>

<body>

<div class="container">
    <h1 id="title">טוען...</h1>
    <p id="message"></p>

    <div class="buttons">
        <a id="wa" class="btn whatsapp">💬 שלח וואטסאפ</a>
        <a id="phone" class="btn phone">📞 התקשר</a>
        <a id="email" class="btn email">✉️ שלח מייל</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 שים כאן את הקונפיג שלך
const firebaseConfig = {
  apiKey: "AIzaSyC6aKRxx0JkeBA7RjeZK23SkCLeO-zqXVU",
  authDomain: "lost-items-28167.firebaseapp.com",
  projectId: "lost-items-28167",
  storageBucket: "lost-items-28167.firebasestorage.app",
  messagingSenderId: "536499158176",
  appId: "1:536499158176:web:ea2fbf70e173ab59a9ddc5"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔍 קבלת ID מהקישור
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id) {
    document.getElementById("title").innerText = "❌ אין קוד";
    throw new Error("No ID");
}

// 📦 שליפת נתונים
const docRef = doc(db, "items", id);
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {
    const item = docSnap.data();

    // ✨ תוכן
    document.getElementById("title").innerText =
        "📦 מצאת את ה" + item.name + " שלי!";
    document.getElementById("message").innerText =
        item.message || "אשמח אם תחזיר 🙏";

    document.title = item.name;

    // 📱 וואטסאפ עם טקסט דינמי
    const text = encodeURIComponent(
        "היי, מצאתי את ה" + item.name + " שלך!"
    );

    document.getElementById("wa").href =
        "https://wa.me/972" + item.phone.substring(1) + "?text=" + text;

    document.getElementById("phone").href =
        "tel:" + item.phone;

    document.getElementById("email").href =
        "mailto:" + item.email;

} else {
    document.getElementById("title").innerText = "❌ חפץ לא נמצא";
    document.getElementById("message").innerText = "ייתכן שהקוד שגוי";
    document.title = "שגיאה";
}
</script>

</body>
</html>
